services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: http://localhost:3000
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:5000
    env_file:
      - ./frontend/.env
    environment:
      # next.config.ts rewrites() proxies /api/* to BACKEND_URL at server
      # runtime; supply it here so the rewrite path resolves to the backend
      # service instead of the localhost:5000 config default.
      BACKEND_URL: http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
