services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: http://localhost:3000

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
