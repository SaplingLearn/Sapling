<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sapling — LinkedIn Banner</title>
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 10px;
    }
    p { color: rgba(255,255,255,0.3); font: 11px/1 monospace; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <p>1584 × 396 — right-click canvas → Save image as</p>
  <canvas id="c" width="1584" height="396"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1584, H = 396;

// ── Seeded PRNG (xorshift32) ──────────────────────────────────────
let _s = 19;
function rand() {
  _s ^= _s << 13; _s ^= _s >> 17; _s ^= _s << 5;
  return (_s >>> 0) / 0x100000000;
}

// ── Exact landing page colour palette + weights ───────────────────
const palette = [
  { c: '#8A63D2', w: 0.24 }, { c: '#3B82F6', w: 0.24 },
  { c: '#D97706', w: 0.2 },  { c: '#14B8A6', w: 0.15 },
  { c: '#9CA3AF', w: 0.1 },  { c: '#D1D5DB', w: 0.07 },
];
function randColor() {
  let r = rand(), s = 0;
  for (const p of palette) { s += p.w; if (r <= s) return p.c; }
  return palette[0].c;
}

// ── Background: exact same mesh blobs as landing page ─────────────
// Canvas is alpha:true on the page; blobs are behind it via CSS.
// Here we bake them directly onto the canvas.
ctx.fillStyle = '#f0f4f2';
ctx.fillRect(0, 0, W, H);

function blob(bx, by, r, color) {
  const g = ctx.createRadialGradient(bx, by, 0, bx, by, r);
  g.addColorStop(0, color);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}
// sapling-mesh-blob--1  (green, top-left)
blob(W * -0.08, H * -0.25, W * 0.52, 'rgba(46,125,82,0.22)');
// sapling-mesh-blob--2  (teal, right-center)
blob(W * 1.08,  H * 0.38,  W * 0.44, 'rgba(43,140,150,0.20)');
// sapling-mesh-blob--3  (amber, bottom) — present in hero too
blob(W * 0.48,  H * 1.30,  W * 0.50, 'rgba(232,163,58,0.18)');

// ── 3D scene constants (exact landing page values) ────────────────
const fl  = 1000;        // focal length
const cx  = W / 2;       // 792
const cy  = H / 2;       // 198
const rot = 0.22;        // frozen rotation angle (radians)
const t   = 2.4;         // frozen time  (gives nice per-node phase offsets)

// Cluster centres — original x/z kept identical.
// y is scaled by H/1050 ≈ 0.377 so the scene fills the banner height.
const YS = H / 1050;
const clusters = [
  { x: -600, y: -250 * YS, z:   80 }, { x: -350, y: -100 * YS, z: -120 },
  { x: -100, y: -300 * YS, z:  200 }, { x:  150, y: -150 * YS, z:  -80 },
  { x:  400, y: -250 * YS, z:  150 }, { x:  600, y: -100 * YS, z:  -50 },
  { x: -500, y:  100 * YS, z: -150 }, { x: -200, y:  200 * YS, z:  100 },
  { x:   50, y:  150 * YS, z: -200 }, { x:  300, y:  250 * YS, z:  120 },
  { x:  550, y:  150 * YS, z: -100 }, { x: -400, y:  350 * YS, z:   60 },
  { x:    0, y:    0,       z:    0 }, { x:  200, y:  -50 * YS, z: -150 },
];
const spread = 280;

// 220 background nodes — exact same count & generation as landing page
const bgNodes = Array.from({ length: 220 }, () => {
  const cl = clusters[Math.floor(rand() * clusters.length)];
  return {
    ox:     cl.x + (rand() - 0.5) * spread,
    oy:     cl.y + (rand() - 0.5) * spread * YS,
    oz:     cl.z + (rand() - 0.5) * spread,
    color:  randColor(),
    radius: 1 + rand() * 4,
    seed:   rand() * 100,
  };
});

// 6 cluster-feature nodes (CLUSTER_INIT_POS from landing page, idle state)
const CLUSTER_COLORS  = ['#9CA3AF','#D97706','#3B82F6','#8A63D2','#14B8A6','#EF4444'];
const CLUSTER_SEEDS   = [10, 11.3, 12.6, 13.9, 15.2, 16.5];
const CLUSTER_INIT    = [
  { ox: -222, oy: -29 * YS, oz:  15 },
  { ox: -161, oy: -59 * YS, oz: -20 },
  { ox:  -81, oy: -42 * YS, oz:  30 },
  { ox:  -67, oy:  17 * YS, oz:   0 },
  { ox: -168, oy:  59 * YS, oz:  20 },
  { ox: -229, oy:   8 * YS, oz: -30 },
];
const clusterNodes = CLUSTER_INIT.map((pos, i) => ({
  ox:     pos.ox,
  oy:     pos.oy,
  oz:     pos.oz,
  color:  CLUSTER_COLORS[i],
  radius: 2.5 + rand() * 1.5,
  seed:   CLUSTER_SEEDS[i],
}));

const nodes = [...bgNodes, ...clusterNodes];

// ── Project 3D → 2D (exact landing page math, no mouse/parallax) ──
const proj = nodes.map(n => {
  const ny = n.oy + Math.sin(t * 0.4 + n.seed) * 15 * YS;
  const x  = n.ox * Math.cos(rot) - n.oz * Math.sin(rot);
  const z  = n.oz * Math.cos(rot) + n.ox * Math.sin(rot);
  const sc = fl / (fl + z);
  return { x: x * sc + cx, y: ny * sc + cy, z, sc, n };
}).sort((a, b) => b.z - a.z);   // back-to-front

// ── Connections (exact formula from landing page) ─────────────────
ctx.globalCompositeOperation = 'source-over';
ctx.lineWidth = 0.5;
for (let i = 0; i < proj.length; i++) {
  for (let j = i + 1; j < proj.length; j++) {
    const p1 = proj[i], p2 = proj[j];
    const d = Math.hypot(p1.x - p2.x, p1.y - p2.y);
    if (d < 70 * p1.sc) {
      const a = (1 - d / (70 * p1.sc)) * 0.15 * Math.min(1, p1.sc);
      if (a > 0.002) {
        ctx.strokeStyle = `rgba(156,163,175,${a.toFixed(4)})`;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
    }
  }
}

// ── Nodes (exact formula, idle state — no glow/shadow) ───────────
proj.forEach(p => {
  if (p.z <= -fl) return;
  const breathe = 0.92 + 0.08 * Math.sin(t * 0.6 + p.n.seed);
  const fogA    = p.z > 500 ? Math.max(0, 1 - (p.z - 500) / 500) : 1;
  const r       = p.n.radius * p.sc * breathe;
  if (r > 0.1) {
    ctx.globalAlpha = fogA;
    ctx.fillStyle   = p.n.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
  }
});
ctx.globalAlpha = 1;

// ── Atmospheric white gradients (layered, space-like depth) ───────

// 1. Soft central nebula — large diffuse glow from slightly above centre
const nebula = ctx.createRadialGradient(cx * 0.9, cy * 0.55, 0, cx * 0.9, cy * 0.55, W * 0.62);
nebula.addColorStop(0,    'rgba(255,255,255,0.30)');
nebula.addColorStop(0.35, 'rgba(255,255,255,0.12)');
nebula.addColorStop(0.65, 'rgba(255,255,255,0.04)');
nebula.addColorStop(1,    'rgba(255,255,255,0)');
ctx.fillStyle = nebula;
ctx.fillRect(0, 0, W, H);

// 2. Secondary glow — right-of-centre, cooler tone (very subtle)
const glow2 = ctx.createRadialGradient(cx * 1.4, cy * 1.3, 0, cx * 1.4, cy * 1.3, W * 0.38);
glow2.addColorStop(0,    'rgba(240,248,255,0.18)');
glow2.addColorStop(0.5,  'rgba(240,248,255,0.06)');
glow2.addColorStop(1,    'rgba(240,248,255,0)');
ctx.fillStyle = glow2;
ctx.fillRect(0, 0, W, H);

// 3. Top-edge bloom — pulls eye upward like a light source above
const topBloom = ctx.createLinearGradient(0, 0, 0, H * 0.55);
topBloom.addColorStop(0,   'rgba(255,255,255,0.28)');
topBloom.addColorStop(0.4, 'rgba(255,255,255,0.07)');
topBloom.addColorStop(1,   'rgba(255,255,255,0)');
ctx.fillStyle = topBloom;
ctx.fillRect(0, 0, W, H);

// 4. Bottom-edge fade — grounds the scene, adds depth
const botFade = ctx.createLinearGradient(0, H, 0, H * 0.55);
botFade.addColorStop(0,   'rgba(255,255,255,0.18)');
botFade.addColorStop(0.5, 'rgba(255,255,255,0.04)');
botFade.addColorStop(1,   'rgba(255,255,255,0)');
ctx.fillStyle = botFade;
ctx.fillRect(0, 0, W, H);
</script>
</body>
</html>
