#:schema node_modules/wrangler/config-schema.json
#
# Cloudflare config for the Next.js frontend.
#
# This project uses middleware, API routes, rewrites, and dynamic
# routes, none of which are compatible with `next export`. The
# deploy target therefore has to be Cloudflare **Workers** (not
# Pages). Build with `npm run cf:build` then `wrangler deploy`.
#
# If you still want to use Cloudflare Pages, you'll need to either
# (a) move off middleware/API routes, or (b) wait for
# @cloudflare/next-on-pages to add Next 16 support.

name = "sapling-frontend"
main = ".open-next/worker.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
binding = "ASSETS"
directory = ".open-next/assets"

[observability]
enabled = true
